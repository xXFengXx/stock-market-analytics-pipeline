stock_dbt:
  target: dev
  outputs:
    dev:
      type: postgres
      host: "{{ env_var('POSTGRES_HOST', '127.0.0.1') }}"
      port: 5432
      dbname: "{{ env_var('POSTGRES_DB', 'stock_analytics') }}"
      user: "{{ env_var('POSTGRES_USER', 'postgres') }}"
      password: "{{ env_var('POSTGRES_PASSWORD', 'stock1234') }}"
      schema: public
      threads: 4
      connect_timeout: 10

