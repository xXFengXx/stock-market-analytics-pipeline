version: 2

models:
  - name: fact_stock_prices
    description: "Core fact table: one row per (date, ticker) with OHLCV data and derived intraday metrics."
    columns:
      - name: date
        description: "Trading date."
        tests:
          - not_null
      - name: ticker
        description: "Ticker symbol."
        tests:
          - not_null
          - accepted_values:
              values: ['AAPL', 'MSFT', 'AMZN', 'GOOGL', 'META', 'NVDA', 'TSLA', 'BRK-B', 'JPM', 'JNJ']
      - name: close
        description: "Closing price."
        tests:
          - not_null
      - name: volume
        description: "Daily volume."
        tests:
          - not_null

  - name: mart_moving_averages
    description: "7-day, 30-day, and 90-day simple moving averages of closing price per ticker."
    columns:
      - name: date
        tests: [not_null]
      - name: ticker
        tests: [not_null]
      - name: close
        tests: [not_null]

  - name: mart_volatility
    description: "Daily returns and 30-day annualised rolling volatility per ticker."
    columns:
      - name: date
        tests: [not_null]
      - name: ticker
        tests: [not_null]

  - name: mart_performance_comparison
    description: "Index-normalised performance (base = 100) enabling cross-ticker comparison."
    columns:
      - name: date
        tests: [not_null]
      - name: ticker
        tests: [not_null]
      - name: indexed_performance
        tests: [not_null]
