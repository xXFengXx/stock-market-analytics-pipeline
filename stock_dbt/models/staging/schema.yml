version: 2

models:
  - name: stg_stock_prices
    description: "Standardised daily OHLCV records from Yahoo Finance, one row per (date, ticker)."
    columns:
      - name: date
        description: "Trading date."
        tests:
          - not_null
      - name: ticker
        description: "Uppercase ticker symbol."
        tests:
          - not_null
          - accepted_values:
              values: ['AAPL', 'MSFT', 'AMZN', 'GOOGL', 'META', 'NVDA', 'TSLA', 'BRK-B', 'JPM', 'JNJ']
      - name: close
        description: "Closing price."
        tests:
          - not_null
      - name: volume
        description: "Total traded volume."
        tests:
          - not_null
